---
layout: default
---
<style>
  .post-container {
    background: var(--card-bg);
    border-radius: 12px;
    padding: 40px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.03);
  }
  @media (max-width: 600px) { .post-container { padding: 24px; } } 

  .post-header {
    margin-bottom: 32px;
    border-bottom: 1px solid var(--border-color);
    padding-bottom: 24px;
  }
  .post-title {
    font-size: 2.2rem;
    font-weight: bold;
    margin: 0 0 12px 0;
    line-height: 1.4;
    color: var(--primary-color); 
  }
  .post-date { color: #757575; font-size: 0.95rem; }

  
  .post-content { line-height: 1.9; font-size: 1.05rem; overflow-wrap: break-word; }
  
  
  .post-content a { color: var(--primary-color); text-decoration: underline; }
  .post-content a:hover { text-decoration: none; }

 
  .post-content h1, .post-content h2, .post-content h3 {
    padding-bottom: 8px;
    margin-top: 48px;
    margin-bottom: 16px;
    color: #4a148c; 
  }
  .post-content h1 { border-bottom: 3px solid var(--primary-light); font-size: 1.8rem;}
  .post-content h2 { border-bottom: 2px solid var(--primary-light); font-size: 1.6rem;}
  
  .post-content img { max-width: 100%; border-radius: 8px; margin: 24px 0;}
  
  
  .post-content pre {
    background: #f1f3f5;
    padding: 16px;
    border-radius: 8px;
    overflow-x: auto;
    border: 1px solid #e0e0e0;
  }
  
  .post-content code {
    font-family: Monaco, Consolas, "Courier New", monospace;
    color: #4a148c;
    background-color: var(--primary-light);
    padding: 2px 5px;
    border-radius: 4px;
    font-size: 0.9em;
  }
  .post-content pre code { color: inherit; background-color: transparent; padding: 0;}
  

  .post-content blockquote {
    border-left: 4px solid var(--primary-color); 
    margin: 24px 0;
    padding: 8px 16px;
    color: #757575;
    background-color: var(--bg-color); 
  }
</style>

<article class="post-container">
  <header class="post-header">
    <h1 class="post-title">{{ page.title }}</h1>
    <div class="post-date">{{ page.date | date: "%Y/%m/%d" }}</div>
  </header>
  <div class="post-content">
    {{ content }}
  </div>
</article>
