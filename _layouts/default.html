<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title | default: site.title }}</title>
  <style>
    :root {
      --primary-color: #673ab7;
      --primary-light: #ede7f6;
      --bg-color: #fbfaff;
      --text-color: #242424;
      --border-color: #e2e2e2;
      --card-bg: #ffffff;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-color);
      margin: 0;
    }
    header {
      background-color: var(--card-bg);
      border-bottom: 1px solid var(--border-color);
      padding: 12px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .logo {
      text-decoration: none;
      color: var(--primary-color);
      font-weight: bold;
      font-size: 1.3rem;
    }
    
    .post-button {
      background-color: var(--primary-color);
      color: white !important;
      text-decoration: none;
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 0.9rem;
      font-weight: bold;
      transition: opacity 0.2s;
    }
    .post-button:hover { opacity: 0.8; }

    main {
      max-width: 800px;
      margin: 40px auto;
      padding: 0 20px 80px;
    }
  </style>
</head>
<body>
  <header>
    <a href="{{ '/' | relative_url }}" class="logo">{{ site.title }}</a>
    <a href="https://github.com/ima-aarr/nikkidao/issues/new" class="post-button">投稿する</a>
  </header>
  <main>
    {{ content }}
  </main>
</body>
</html>
